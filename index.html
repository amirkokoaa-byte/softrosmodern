
<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Soft Rose Modern Trade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Cairo', sans-serif;
        margin: 0;
        overflow-x: hidden;
        transition: all 0.5s ease;
      }

      .bg-blob {
        position: fixed;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        filter: blur(120px);
        z-index: -1;
        opacity: 0.3;
        animation: move 25s infinite alternate ease-in-out;
      }

      /* Themes definition */
      body.blob-gray { background: #111827; color: white; }
      .blob-gray .blob-1 { background: #374151; top: -200px; right: -200px; opacity: 0.5; }
      .blob-gray .blob-2 { background: #1f2937; bottom: -200px; left: -200px; opacity: 0.5; }
      .blob-gray .blob-3 { background: #4b5563; top: 30%; left: 20%; opacity: 0.3; }

      body.blob-rose { background: #020617; color: white; }
      .blob-rose .blob-1 { background: #881337; top: -200px; right: -200px; }
      .blob-rose .blob-2 { background: #4c1d95; bottom: -200px; left: -200px; }
      .blob-rose .blob-3 { background: #db2777; top: 30%; left: 20%; }

      body.blob-dark { background: #000000; color: white; }
      .blob-dark .blob-1 { background: #1e293b; top: -200px; right: -200px; opacity: 0.2; }
      .blob-dark .blob-2 { background: #0f172a; bottom: -200px; left: -200px; opacity: 0.2; }
      .blob-dark .blob-3 { background: #334155; top: 30%; left: 20%; opacity: 0.1; }

      body.blob-purple { background: #0a0118; color: white; }
      .blob-purple .blob-1 { background: #581c87; top: -200px; right: -200px; }
      .blob-purple .blob-2 { background: #7e22ce; bottom: -200px; left: -200px; }
      .blob-purple .blob-3 { background: #a855f7; top: 30%; left: 20%; }

      body.blob-emerald { background: #010a05; color: white; }
      .blob-emerald .blob-1 { background: #064e3b; top: -200px; right: -200px; }
      .blob-emerald .blob-2 { background: #065f46; bottom: -200px; left: -200px; }
      .blob-emerald .blob-3 { background: #059669; top: 30%; left: 20%; }

      @keyframes move {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(150px, 150px) scale(1.3); }
      }

      .glass-card-dark {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .glass-input-dark {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white !important;
      }

      @keyframes ticker-scroll {
        0% { transform: translateX(100%); }
        100% { transform: translateX(-100%); }
      }
      .animate-ticker {
        display: inline-block;
        white-space: nowrap;
        animation: ticker-scroll 30s linear infinite;
      }
      .ticker-container {
        width: 100%;
        overflow: hidden;
        white-space: nowrap;
      }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react/": "https://esm.sh/react@^19.2.3/",
        "react": "https://esm.sh/react@^19.2.3",
        "firebase/": "https://esm.sh/firebase@^12.7.0/",
        "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
        "xlsx": "https://esm.sh/xlsx@^0.18.5",
        "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
      }
    }
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="blob-gray">
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>
    <div class="bg-blob blob-3"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
